spring:
  application:
    name: canastauy-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/canastauy}
    username: ${DATABASE_USER:canastauy_user}
    password: ${DATABASE_PASSWORD:canastauy_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: ${PORT:8080}

api:
  rate-limit:
    requests-per-hour: 1000

logging:
  level:
    root: INFO
    uy.eleven.canasta: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT Configuration
# Note: JWT_SECRET must be Base64-encoded and at least 256 bits (32 bytes)
# Generate with: openssl rand -base64 32
canasta:
  security:
    jwt:
      secret: "${JWT_SECRET}"
      access-token-ttl: 900000
      refresh-token-ttl: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
