spring:
  application:
    name: canastauy-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/canastauy
    username: canastauy_user
    password: canastauy_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-secret-key-min-256-bits}
  expiration: 86400000

api:
  rate-limit:
    requests-per-hour: 1000

logging:
  level:
    root: INFO
    uy.eleven.canasta: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
