version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: canastauy-postgres
    environment:
      POSTGRES_DB: canastauy
      POSTGRES_USER: canastauy_user
      POSTGRES_PASSWORD: canastauy_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U canastauy_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canastauy-network

  redis:
    image: redis:7-alpine
    container_name: canastauy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canastauy-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: canastauy-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@canastauy.uy
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - canastauy-network

volumes:
  postgres_data:
  redis_data:

networks:
  canastauy-network:
    driver: bridge
